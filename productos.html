<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<link rel="stylesheet" href="css/productos.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">
    <h2>🛒 SmartStock AI</h2>

    <button onclick="irPagina('dashboard.html')">🏠 Dashboard</button>
    <button onclick="irPagina('productos.html')">📦 Productos</button>
    <button onclick="irPagina('ventas.html')">🛒 Ventas</button>
    <button onclick="irPagina('compras.html')">🚚 Compras</button>
    <button onclick="irPagina('usuarios.html')">👥 Usuarios</button>
    <button onclick="irPagina('smartai.html')">🤖 Smart AI</button>
</div>

<div class="contenido container">

<h1 class="mb-4">Gestión de Productos</h1>

<button class="btn btn-success mb-3" onclick="mostrarFormulario()">
➕ Agregar Producto
</button>

<div id="formulario" class="formulario oculto card p-3 mb-4">

<h3 class="mb-3">Nuevo Producto</h3>

<div class="row g-3">

<div class="col-12 col-md-6">
<input type="text" id="nombre" class="form-control" placeholder="Nombre del producto">
</div>

<div class="col-12 col-md-6">
<input type="text" id="unidad" class="form-control" placeholder="Unidad de medida (kg, litro, pieza)">
</div>

<div class="col-12 col-md-6">
<input type="number" id="precio" class="form-control" placeholder="Precio">
</div>

<div class="col-12 col-md-6">
<input type="number" id="cantidad" class="form-control" placeholder="Cantidad">
</div>

<div class="col-12">
<button class="btn btn-primary mt-2" onclick="agregarProducto()">
Guardar
</button>
</div>

</div>

</div>

<div class="table-responsive">

<table id="tablaProductos" class="table table-striped">

<thead>
<tr>
<th>Nombre</th>
<th>Unidad</th>
<th>Precio</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

</div>

</div>

<script src="js/productos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
