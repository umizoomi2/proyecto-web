<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Usuarios</title>

<link rel="stylesheet" href="css/usuarios.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">
    <h2>🛒 SmartStock AI</h2>

    <button onclick="irPagina('dashboard.html')">🏠 Dashboard</button>
    <button onclick="irPagina('productos.html')">📦 Productos</button>
    <button onclick="irPagina('ventas.html')">🛒 Ventas</button>
    <button onclick="irPagina('compras.html')">🚚 Compras</button>
    <button onclick="irPagina('usuarios.html')">👥 Usuarios</button>
    <button onclick="irPagina('smartai.html')">🤖 Smart AI</button>
</div>

<div class="contenido container">

<h1 class="mb-4">Gestión de Usuarios</h1>

<!-- FORMULARIO -->

<div class="card p-4 mb-4">

<h3>Registrar Usuario</h3>

<div class="row g-3 mt-2">

<div class="col-12 col-md-4">
<input type="text" class="form-control" id="nombreUsuario" placeholder="Nombre">
</div>

<div class="col-12 col-md-4">
<input type="email" class="form-control" id="correoUsuario" placeholder="Correo electrónico">
</div>

<div class="col-12 col-md-4">
<select class="form-control" id="rolUsuario">
<option value="">Seleccionar rol</option>
<option>Administrador</option>
<option>Empleado</option>
</select>
</div>

<div class="col-12">
<button class="btn btn-primary" onclick="agregarUsuario()">
Agregar Usuario
</button>
</div>

</div>

</div>

<!-- TABLA DE USUARIOS -->

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>
<th>Nombre</th>
<th>Correo</th>
<th>Rol</th>
</tr>

</thead>

<tbody id="tablaUsuarios">

<tr>
<td>Admin</td>
<td>admin@empresa.com</td>
<td>Administrador</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="js/usuarios.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
