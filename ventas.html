<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ventas - SmartStock AI</title>

<link rel="stylesheet" href="css/ventas.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h1 class="mb-4">Registro de Ventas</h1>

<div class="row g-3 formulario">

<div class="col-12 col-md-4">
<input type="text" id="codigo" class="form-control" placeholder="Código del producto">
</div>

<div class="col-12 col-md-4">
<input type="text" id="nombre" class="form-control" placeholder="Nombre del producto">
</div>

<div class="col-12 col-md-4">
<input type="number" id="cantidad" class="form-control" placeholder="Cantidad" min="1" value="1">
</div>

</div>

<div class="table-responsive mt-4">

<table id="tablaVentas" class="table table-striped">

<thead>
<tr>
<th>Código</th>
<th>Nombre</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="d-flex gap-3 mt-4 botones">

<button id="pagar" class="btn btn-success">
Pagar
</button>

<button id="cancelar" class="btn btn-danger">
Cancelar
</button>

</div>

</div>

<script src="js/ventas.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
