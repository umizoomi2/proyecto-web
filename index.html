<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartStock AI</title>

<!-- CSS -->
<link rel="stylesheet" href="/css/index.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar" id="sidebar">

    <div class="top">
        <h2>SmartStock AI</h2>
        <button class="toggle-btn" onclick="toggleMenu()">☰</button>
    </div>

    <ul>
        <li onclick="irPagina('/index.html')">🏠 <span>Inicio</span></li>
        <li onclick="irPagina('/productos.html')">📦 <span>Productos</span></li>
        <li onclick="irPagina('/ventas.html')">🛒 <span>Ventas</span></li>
        <li onclick="irPagina('/compras.html')">🚚 <span>Compras</span></li>
        <li onclick="irPagina('/usuarios.html')">👥 <span>Usuarios</span></li>
        <li onclick="irPagina('/reportes.html')">📊 <span>Reportes</span></li>
    </ul>

</div>

<div class="contenido container">

    <div class="header">
        <h1>Bienvenido a SmartStock AI</h1>
        <p>Control inteligente de inventario y ventas</p>
    </div>

    <div class="cards row">

        <div class="col-lg-3 col-md-6 col-sm-12">
            <div class="card productos" onclick="irPagina('/productos.html')">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679720.png" alt="Productos">
                <h3>Productos</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 col-sm-12">
            <div class="card ventas" onclick="irPagina('/ventas.html')">
                <img src="https://cdn-icons-png.flaticon.com/512/1170/1170627.png" alt="Ventas">
                <h3>Ventas</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 col-sm-12">
            <div class="card compras" onclick="irPagina('/compras.html')">
                <img src="https://cdn-icons-png.flaticon.com/512/3082/3082383.png" alt="Compras">
                <h3>Compras</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 col-sm-12">
            <div class="card usuarios" onclick="irPagina('/usuarios.html')">
                <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Usuarios">
                <h3>Usuarios</h3>
            </div>
        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="/js/index.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
