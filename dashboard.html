<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - SmartStock AI</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">
    <h2>🛒 SmartStock AI</h2>

    <button onclick="irPagina('dashboard.html')">🏠 Dashboard</button>
    <button onclick="irPagina('productos.html')">📦 Productos</button>
    <button onclick="irPagina('ventas.html')">🛒 Ventas</button>
    <button onclick="irPagina('compras.html')">🚚 Compras</button>
    <button onclick="irPagina('usuarios.html')">👥 Usuarios</button>
    <button onclick="irPagina('reportes.html')">📊 Reportes</button>
</div>

<div class="contenido container">

<h1 class="mb-4">Panel de Control</h1>

<div class="row g-4">

<div class="col-12 col-md-6 col-lg-3">
<div class="card productos text-center p-3">
<h3>Productos</h3>
<p id="totalProductos">0</p>
</div>
</div>

<div class="col-12 col-md-6 col-lg-3">
<div class="card ventas text-center p-3">
<h3>Ventas</h3>
<p id="totalVentas">0</p>
</div>
</div>

<div class="col-12 col-md-6 col-lg-3">
<div class="card compras text-center p-3">
<h3>Compras</h3>
<p id="totalCompras">0</p>
</div>
</div>

<div class="col-12 col-md-6 col-lg-3">
<div class="card usuarios text-center p-3">
<h3>Usuarios</h3>
<p id="totalUsuarios">0</p>
</div>
</div>

</div>

<div class="reporte mt-5">

<h2>Reporte Rápido de Ventas</h2>

<button class="btn btn-primary mt-2" onclick="generarReporte()">
Generar Reporte
</button>

<p id="resultadoReporte" class="mt-3"></p>

</div>

</div>

<script src="js/dashboard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
